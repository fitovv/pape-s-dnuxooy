<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>С Днём Рождения, Папа! 🎂</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #ffe0e7, #f5b0c0);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.6s ease;
            overflow-x: hidden;
        }

        body.celebration-bg {
            background: radial-gradient(circle at 40% 20%, #ffdde1, #ffb7c5, #e2b0ff);
            animation: softGlowBg 3s infinite alternate;
        }

        @keyframes softGlowBg {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.02); background-size: 100% 100%; }
        }

        .glass-card {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 250, 245, 0.88);
            backdrop-filter: blur(14px);
            border-radius: 70px;
            padding: 30px 25px 45px;
            box-shadow: 0 30px 45px rgba(0, 0, 0, 0.2), inset 0 1px 4px rgba(255, 255, 200, 0.8);
            text-align: center;
            transition: all 0.3s;
        }

        /* ТАЙМЕР */
        #timer-container h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c43a5e, #f28b2c);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 25px;
        }

        .countdown-wrapper {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 18px;
            margin-bottom: 35px;
        }

        .time-unit {
            background: rgba(255, 250, 240, 0.9);
            backdrop-filter: blur(4px);
            padding: 15px 18px;
            min-width: 95px;
            border-radius: 56px;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,200,180,0.7);
        }

        .time-unit span {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(145deg, #e63946, #ff8c42);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
        }

        .time-unit p {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #7a3e2e;
            margin-top: 8px;
            text-transform: uppercase;
        }

        #timer-message {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d62828, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: pulseGlow 1.6s infinite;
            margin: 10px 0;
        }

        @keyframes pulseGlow {
            0% { text-shadow: 0 0 0 rgba(214,40,40,0.2);}
            100% { text-shadow: 0 0 12px rgba(255,180,70,0.6);}
        }

        /* кнопка убрать таймер */
        .skip-timer-btn {
            background: linear-gradient(100deg, #ff9a5e, #ff6a3d);
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 8px 14px rgba(0,0,0,0.15);
            transition: 0.2s;
            font-family: inherit;
            backdrop-filter: blur(2px);
        }

        .skip-timer-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(100deg, #ff7a3a, #ff5120);
            box-shadow: 0 12px 20px rgba(0,0,0,0.2);
        }

        /* ТОРТ (улучшенный) */
        #cake-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 5px;
        }

        .cake-wrapper {
            position: relative;
            width: 300px;
            height: 240px;
            margin-bottom: 30px;
            cursor: pointer;
            filter: drop-shadow(0 18px 20px rgba(0,0,0,0.25));
            transition: transform 0.25s ease;
        }
        .cake-wrapper:hover {
            transform: translateY(-8px);
        }

        #cake {
            position: relative;
            width: 100%;
            height: 100%;
            background: #f7e1b0;
            border-radius: 55% 55% 40% 40% / 14% 14% 20% 20%;
            overflow: visible;
            box-shadow: inset 0 2px 8px rgba(255,245,180,0.9), 0 10px 20px rgba(0,0,0,0.2);
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 28%;
            background: #efcb8a;
            border-radius: inherit;
        }
        .layer1 { top: 0; background: #fad893; border-bottom: 3px solid #e2b66b; }
        .layer2 { top: 28%; background: #f5cf92; border-bottom: 3px solid #e0ae66; }
        .layer3 { top: 56%; background: #efc27a; border-bottom: 3px solid #dba458; }
        .layer4 { top: 84%; background: #e8b86d; border-radius: 0 0 35px 35px; }

        .frosting-swirl {
            position: absolute;
            top: -14px;
            left: -12px;
            right: -12px;
            bottom: -8px;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,250,210,0.95), rgba(252, 234, 170, 0.9));
            border-radius: 58% 58% 42% 42% / 25% 25% 30% 30%;
            pointer-events: none;
            box-shadow: inset 0 2px 8px #fff3cf, 0 6px 12px rgba(0,0,0,0.1);
            background-image: repeating-radial-gradient(circle at 20% 35%, rgba(255,210,120,0.4) 2px, transparent 3px);
        }

        .sprinkles {
            position: absolute;
            top: 5px;
            left: 0;
            width: 100%;
            height: 45%;
            pointer-events: none;
            z-index: 5;
        }
        .sprinkle {
            position: absolute;
            width: 8px;
            height: 4px;
            background: #ff6f61;
            border-radius: 30%;
            transform: rotate(45deg);
            box-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }
        .sprinkle:nth-child(1) { top: 12%; left: 15%; background: #ffb347; transform: rotate(20deg); width: 10px;}
        .sprinkle:nth-child(2) { top: 25%; left: 65%; background: #6a4e9b; transform: rotate(-25deg);}
        .sprinkle:nth-child(3) { top: 38%; left: 30%; background: #43aa8b; transform: rotate(60deg); width: 6px;}
        .sprinkle:nth-child(4) { top: 18%; left: 80%; background: #f94144; transform: rotate(10deg);}
        .sprinkle:nth-child(5) { top: 45%; left: 55%; background: #f9c74f; transform: rotate(-15deg);}
        .sprinkle:nth-child(6) { top: 55%; left: 20%; background: #577590; transform: rotate(70deg); width: 9px;}
        .sprinkle:nth-child(7) { top: 62%; left: 72%; background: #f9844a; transform: rotate(40deg);}
        .sprinkle:nth-child(8) { top: 78%; left: 45%; background: #90be6d; transform: rotate(-35deg);}

        .cherry {
            position: absolute;
            top: -18px;
            right: 32px;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle, #e32b2b, #9b1f1f);
            border-radius: 50%;
            z-index: 20;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .cherry::before {
            content: "🍒";
            position: absolute;
            font-size: 18px;
            top: -8px;
            left: 6px;
            opacity: 0.9;
        }
        .cherry-stem {
            position: absolute;
            top: -14px;
            right: 20px;
            width: 12px;
            height: 20px;
            border-left: 3px solid #4c6a3b;
            border-radius: 80% 0 0 0;
            transform: rotate(35deg);
            z-index: 19;
        }

        .plate-cake {
            position: absolute;
            bottom: -38px;
            left: 50%;
            transform: translateX(-50%);
            width: 350px;
            height: 36px;
            background: radial-gradient(ellipse, #f0e4d2, #dcc29e);
            border-radius: 50%;
            box-shadow: 0 16px 18px -8px rgba(0,0,0,0.4);
            border: 1px solid #faf2e0;
        }

        #candle {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 62px;
            background: linear-gradient(145deg, #ffbf86, #e6822e);
            border-radius: 18px 18px 8px 8px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3);
            z-index: 25;
            cursor: pointer;
        }
        .wick {
            position: absolute;
            top: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 12px;
            background: #3b2a1f;
            border-radius: 2px;
        }
        .flame {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 36px;
            background: radial-gradient(circle, #ffc857, #ff7b00);
            border-radius: 50% 40% 50% 50%;
            filter: blur(3px);
            opacity: 0;
            transition: opacity 0.3s;
            box-shadow: 0 0 20px #ff9f2e;
            z-index: 26;
        }
        .candle-lit .flame {
            opacity: 1;
            animation: flameFlicker 0.2s infinite alternate;
        }
        @keyframes flameFlicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; filter: blur(3px);}
            100% { transform: translateX(-48%) scale(1.15); opacity: 1; filter: blur(4px);}
        }

        .exploding-cake {
            animation: explodeCake 0.7s forwards ease-out;
            pointer-events: none;
        }
        @keyframes explodeCake {
            0% { transform: scale(1); opacity: 1; filter: brightness(1);}
            40% { transform: scale(1.2); opacity: 0.9;}
            100% { transform: scale(2.5); opacity: 0; visibility: hidden;}
        }

        #confetti-area {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 300;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 12px;
            height: 18px;
            background: #f4a261;
            clip-path: polygon(0% 0%, 100% 0%, 70% 100%, 30% 100%);
            opacity: 0;
            animation: confettiFall 3s linear forwards;
        }
        @keyframes confettiFall {
            0% { opacity: 1; transform: translateY(-15vh) rotate(0deg);}
            80% { opacity: 0.9;}
            100% { opacity: 0; transform: translateY(110vh) rotate(800deg);}
        }

        .wish-message {
            font-size: 1.7rem;
            font-weight: 700;
            max-width: 550px;
            margin: 25px auto 15px;
            padding: 22px 25px;
            background: rgba(255, 245, 230, 0.96);
            backdrop-filter: blur(12px);
            border-radius: 80px;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
            color: #a73c2c;
            border-left: 8px solid #ffaa55;
            border-right: 8px solid #ffaa55;
            text-align: center;
            animation: fadeUp 0.5s ease-out;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(35px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .hidden {
            display: none;
        }

        .btn-secondary {
            background: #f0bc8c;
            color: #4a2e2a;
            border: none;
            font-weight: bold;
            padding: 8px 20px;
            border-radius: 40px;
            margin-top: 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .btn-secondary:hover {
            background: #eaa56a;
        }

        @media (max-width: 550px) {
            .glass-card { padding: 20px 16px; }
            .time-unit { min-width: 70px; padding: 10px 8px; }
            .time-unit span { font-size: 2rem; }
            .cake-wrapper { width: 250px; height: 200px; }
            .plate-cake { width: 280px; }
            .wish-message { font-size: 1.3rem; padding: 15px;}
        }
    </style>
</head>
<body>
<div class="glass-card">
    <!-- Таймер -->
    <div id="timer-container">
        <h1>🎈 До дня рождения папы 🎈</h1>
        <div class="countdown-wrapper">
            <div class="time-unit"><span id="days">00</span><p>Дней</p></div>
            <div class="time-unit"><span id="hours">00</span><p>Часов</p></div>
            <div class="time-unit"><span id="minutes">00</span><p>Минут</p></div>
            <div class="time-unit"><span id="seconds">00</span><p>Секунд</p></div>
        </div>
        <p id="timer-message" class="hidden">🎂 С Днём Рождения, Папа! 🎂</p>
        <button id="skipTimerBtn" class="skip-timer-btn">🎁 Убрать таймер и открыть торт 🎁</button>
    </div>

    <!-- Торт (изначально скрыт) -->
    <div id="cake-container" class="hidden">
        <div class="cake-wrapper" id="cakeWrapper">
            <div id="cake">
                <div class="layer layer1"></div>
                <div class="layer layer2"></div>
                <div class="layer layer3"></div>
                <div class="layer layer4"></div>
                <div class="frosting-swirl"></div>
                <div class="sprinkles">
                    <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                    <div class="sprinkle"></div><div class="sprinkle"></div><div class="sprinkle"></div>
                    <div class="sprinkle"></div><div class="sprinkle"></div>
                </div>
                <div class="cherry-stem"></div>
                <div class="cherry"></div>
                <div id="candle">
                    <div class="wick"></div>
                    <div class="flame"></div>
                </div>
                <div class="plate-cake"></div>
            </div>
        </div>
        <div id="confetti-area"></div>
        <div id="wishBox" class="hidden wish-message"></div>
        <button id="resetBgBtn" class="btn-secondary hidden">✨ Снова поздравление ✨</button>
    </div>
</div>

<script>
    (function() {
        // ---------- ТАЙМЕР: 7 ИЮНЯ, 00:10 (10 минут после полуночи 7 июня) ----------
        // Месяц 5 = июнь (т.к. январь = 0), день 7, час 0, минута 10, секунда 0
        const targetDateObj = new Date(2026, 5, 7, 0, 10, 0);

        // Элементы
        const daysSpan = document.getElementById('days');
        const hoursSpan = document.getElementById('hours');
        const minutesSpan = document.getElementById('minutes');
        const secondsSpan = document.getElementById('seconds');
        const timerContainer = document.getElementById('timer-container');
        const timerMessageEl = document.getElementById('timer-message');
        const cakeContainer = document.getElementById('cake-container');
        const cakeWrapper = document.getElementById('cakeWrapper');
        const candle = document.getElementById('candle');
        const confettiArea = document.getElementById('confetti-area');
        const wishBox = document.getElementById('wishBox');
        const skipBtn = document.getElementById('skipTimerBtn');
        const resetBgBtn = document.getElementById('resetBgBtn');
        const bodyEl = document.body;

        // Поздравления
        const wishes = [
            "💖 Папочка, ты — моя опора и пример! С днём рождения! Пусть здоровье будет крепким, а счастье — бесконечным!",
            "🎉 Любимый папа! Желаю тебе неиссякаемой энергии, много улыбок и только тёплых дней. Ты лучший!",
            "🍰 Папуля, с праздником! Пусть каждый день приносит радость, а удача ходит за тобой по пятам. Обнимаю!",
            "🌈 Дорогой папа! Ты — наша скала. Желаю ярких моментов, крепкого здоровья и исполнения мечты!",
            "✨ С днём рождения, папа! Пусть жизнь будет сладкой, как этот торт, а в душе всегда цветёт весна!",
            "🎈 Папочка, спасибо за твою заботу! Желаю тебе путешествий, хороших новостей и вечного оптимизма!",
            "💪 Самый сильный и мудрый! Пусть все цели достигаются легко, а рядом будут только верные люди. Люблю!",
            "🍀 Папа, желаю море позитива, здоровья на 100 лет и чтобы каждый день начинался с улыбки. С днём варенья!",
            "🌟 С праздником, папуля! Ты — магнит для удачи. Пусть деньги, радость и любовь всегда будут с тобой!",
            "💎 Папа, ты — настоящий бриллиант! Желаю тебе вдохновения, лёгкости и только приятных сюрпризов."
        ];

        let celebrationTriggered = false;
        let timerInterval = null;

        function updateCountdown() {
            const now = new Date();
            let diff = targetDateObj - now;
            
            if (diff <= 0) {
                if (timerInterval) clearInterval(timerInterval);
                timerContainer.classList.add('hidden');
                timerMessageEl.classList.remove('hidden');
                cakeContainer.classList.remove('hidden');
                attachCakeEvent();
                return;
            }
            
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (86400000)) / (3600000));
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            
            daysSpan.textContent = String(days).padStart(2,'0');
            hoursSpan.textContent = String(hours).padStart(2,'0');
            minutesSpan.textContent = String(minutes).padStart(2,'0');
            secondsSpan.textContent = String(seconds).padStart(2,'0');
        }
        
        function launchConfetti() {
            const existing = document.querySelectorAll('.confetti-piece');
            existing.forEach(p => p.remove());
            const total = 180;
            const colorsList = ['#ff97a1', '#ffcf4a', '#76c893', '#b583ff', '#ff8c69', '#5bc0ff'];
            for (let i = 0; i < total; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                piece.style.backgroundColor = colorsList[Math.floor(Math.random() * colorsList.length)];
                piece.style.left = Math.random() * window.innerWidth + 'px';
                piece.style.top = -Math.random() * 200 + 'px';
                piece.style.width = Math.random() * 12 + 6 + 'px';
                piece.style.height = Math.random() * 12 + 8 + 'px';
                piece.style.animationDuration = Math.random() * 2 + 2.5 + 's';
                piece.style.animationDelay = Math.random() * 0.6 + 's';
                confettiArea.appendChild(piece);
            }
            setTimeout(() => {
                const allPieces = document.querySelectorAll('.confetti-piece');
                allPieces.forEach(p => p.remove());
            }, 4000);
        }
        
        function showCelebrationMessage() {
            const randomIndex = Math.floor(Math.random() * wishes.length);
            wishBox.textContent = wishes[randomIndex];
            wishBox.classList.remove('hidden');
            bodyEl.classList.add('celebration-bg');
            if (resetBgBtn) resetBgBtn.classList.remove('hidden');
            createSparkles();
        }
        
        function createSparkles() {
            for (let i = 0; i < 40; i++) {
                let spark = document.createElement('div');
                spark.innerHTML = '✨';
                spark.style.position = 'fixed';
                spark.style.fontSize = Math.random() * 18 + 10 + 'px';
                spark.style.left = Math.random() * 100 + '%';
                spark.style.top = Math.random() * 100 + '%';
                spark.style.pointerEvents = 'none';
                spark.style.opacity = '0.5';
                spark.style.zIndex = '999';
                spark.style.animation = 'fadeUp 0.6s ease-out forwards';
                spark.style.animationDuration = '0.8s';
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 2000);
            }
        }
        
        function igniteParty() {
            if (celebrationTriggered) return;
            celebrationTriggered = true;
            candle.classList.add('candle-lit');
            cakeWrapper.classList.add('exploding-cake');
            setTimeout(() => {
                launchConfetti();
                showCelebrationMessage();
            }, 200);
        }
        
        function attachCakeEvent() {
            if (cakeWrapper && !celebrationTriggered) {
                cakeWrapper.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!celebrationTriggered) igniteParty();
                });
            }
            if (candle && !celebrationTriggered) {
                candle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (!celebrationTriggered) igniteParty();
                });
            }
        }
        
        function forceShowCake() {
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
            timerMessageEl.classList.remove('hidden');
            cakeContainer.classList.remove('hidden');
            attachCakeEvent();
        }
        
        if (skipBtn) {
            skipBtn.addEventListener('click', () => {
                forceShowCake();
            });
        }
        
        if (resetBgBtn) {
            resetBgBtn.addEventListener('click', () => {
                if (celebrationTriggered) {
                    launchConfetti();
                    const newIdx = Math.floor(Math.random() * wishes.length);
                    wishBox.textContent = wishes[newIdx];
                    wishBox.classList.remove('hidden');
                    createSparkles();
                } else {
                    if (cakeContainer && !cakeContainer.classList.contains('hidden')) {
                        igniteParty();
                    }
                }
            });
        }
        
        function startTimer() {
            updateCountdown();
            timerInterval = setInterval(updateCountdown, 1000);
        }
        
        startTimer();
        
        if (new Date() > targetDateObj) {
            if (timerInterval) clearInterval(timerInterval);
            timerContainer.classList.add('hidden');
            timerMessageEl.classList.remove('hidden');
            cakeContainer.classList.remove('hidden');
            attachCakeEvent();
        }
    })();
</script>
</body>
</html>
